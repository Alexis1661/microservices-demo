apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: worker
  name: worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      volumes:
        - name: health-data
          emptyDir: {}
      containers:
        - name: worker
          image: {{ .Values.image }}
          volumeMounts:
            - name: health-data
              mountPath: /health-data
        - name: health-sidecar
          image: python:3.11-alpine
          command: ["python3", "-c"]
          args:
            - |
              import http.server, json, os
              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == '/health':
                          try:
                              with open('/health-data/status.json') as f:
                                  data = f.read()
                              self.send_response(200)
                              self.send_header('Content-Type','application/json')
                              self.end_headers()
                              self.wfile.write(data.encode())
                          except:
                              self.send_response(503)
                              self.end_headers()
                              self.wfile.write(b'{"status":"starting"}')
                      else:
                          self.send_response(404)
                          self.end_headers()
                  def log_message(self, format, *args):
                      print(f"[sidecar] {format % args}")
              print("[sidecar] Health check server running on :8080")
              http.server.HTTPServer(('', 8080), Handler).serve_forever()
          ports:
            - containerPort: 8080
              name: health
          volumeMounts:
            - name: health-data
              mountPath: /health-data
