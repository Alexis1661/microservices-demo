name: CD - Infrastructure

on:
  push:
    branches:
      - 'infra/**'
      - main
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Autenticar en GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: "us-central1"

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check

      - name: Import recursos existentes (idempotente)
        working-directory: ./terraform
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Importa el Artifact Registry si ya existe y no está en el state
          terraform import \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=us-central1" \
            google_artifact_registry_repository.microservices \
            "projects/${{ secrets.GCP_PROJECT_ID }}/locations/us-central1/repositories/microservices-demo" \
            || echo "Artifact Registry: ya importado o no existe, continuando..."

          # Importa el cluster GKE si ya existe y no está en el state
          terraform import \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=us-central1" \
            google_container_cluster.primary \
            "projects/${{ secrets.GCP_PROJECT_ID }}/locations/us-central1/clusters/microservices-cluster" \
            || echo "GKE cluster: ya importado o no existe, continuando..."
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: "us-central1"

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: "us-central1"

      - name: Terraform Apply
        working-directory: ./terraform
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: "us-central1"
