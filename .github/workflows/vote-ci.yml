name: CI - Vote Service

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'vote/**'
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'vote/**'

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/microservices-demo/vote

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build, Test & Push Vote
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar con Maven
        working-directory: ./vote
        run: mvn package -DskipTests

      - name: Correr tests
        working-directory: ./vote
        run: mvn test

      - name: Autenticar en GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build imagen Docker
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} \
                       -t ${{ env.IMAGE }}:latest \
                       ./vote

      - name: Push imagen a Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
